name: Content Check

on:
  push:
    branches: [astro, main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Run tests
        run: pnpm test

      - name: Build site
        run: pnpm run build

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --base dist --no-progress 'dist/**/*.html'
          fail: true
