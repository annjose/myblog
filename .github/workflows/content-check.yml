name: Content Check

on:
  push:
    branches: [astro, main, master]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Run tests
        run: pnpm test

      - name: Build site
        run: pnpm run build

      - name: Check internal links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --root-dir $GITHUB_WORKSPACE/dist --exclude '^#' --no-progress 'dist/**/*.html'
          fail: true
